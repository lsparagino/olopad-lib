name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build @olopad/cdk-cognito-branding
        run: npm run build -w packages/cdk-cognito-branding

      - name: Build @olopad/ngx-consent
        run: npm run build -w packages/ngx-consent
